name: campus_navigation
description: SIMATS Campus Navigation App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  smooth_page_indicator: ^1.1.0
  shared_preferences: ^2.2.3
  google_maps_flutter: ^2.5.3
  location: ^8.0.1
  http: ^1.2.0
  flutter_polyline_points: ^2.0.0
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  image_cropper: ^12.1.0
  share_plus: ^7.2.1
  speech_to_text: ^7.4.0
  flutter_html: ^3.0.0-beta.2
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
flutter:
  uses-material-design: true

  assets:
    - assets/images/simats_logo.png
